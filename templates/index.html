<!DOCTYPE html>
<html>
<head>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #1a1a2e;
            font-family: 'Georgia', serif;
            color: white;
        }

        .search-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .search-section h1 {
            font-size: 22px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        input {
            padding: 12px 18px;
            border-radius: 30px;
            border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 16px;
            width: 380px;
            outline: none;
            transition: border 0.2s;
        }

        input::placeholder { color: rgba(255,255,255,0.4); }
        input:focus { border-color: #667eea; }

        button#generateBtn {
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button#generateBtn:hover { opacity: 0.85; }
        button#generateBtn:disabled { opacity: 0.5; cursor: not-allowed; }

        .loading {
            display: none;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* Flashcard section — hidden until cards load */
        .flashcard-section {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .topic-label {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .card-container {
            width: 460px;
            height: 270px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        .card.flipped { transform: rotateY(180deg); }

        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .front {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .back {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            transform: rotateY(180deg);
        }

        .hint {
            position: absolute;
            bottom: 16px;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 24px;
        }

        .arrow {
            background: none;
            border: 2px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 20px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: background 0.2s;
        }

        .arrow:hover { background: rgba(255,255,255,0.15); }

        .dots { display: flex; gap: 8px; }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: background 0.2s;
        }

        .dot.active { background: white; }

        .counter {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .reset-btn {
            margin-top: 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.5);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .reset-btn:hover {
            border-color: white;
            color: white;
        }
    </style>
</head>
<body>

    <!-- Search Section -->
    <div class="search-section" id="searchSection">
        <h1>✦ Flashcard Generator</h1>
        <div class="search-row">
            <input type="text" id="topicInput" placeholder="e.g. Algebra Year 8, country capitals, etc..." />
            <button id="generateBtn" onclick="generateCards()">Generate</button>
        </div>
        <div class="loading" id="loading">⏳ Generating your flashcards...</div>
    </div>

    <!-- Flashcard Section -->
    <div class="flashcard-section" id="flashcardSection">
        <div class="topic-label" id="topicLabel"></div>

        <div class="card-container" onclick="toggleFlip()">
            <div class="card" id="card">
                <div class="front" id="front">
                    <span class="hint">CLICK TO FLIP</span>
                </div>
                <div class="back" id="back">
                    <span class="hint">CLICK TO FLIP BACK</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="arrow" onclick="changeCard(-1)">&#8592;</button>
            <div class="dots" id="dots"></div>
            <button class="arrow" onclick="changeCard(1)">&#8594;</button>
        </div>

        <div class="counter" id="counter"></div>
        <button class="reset-btn" onclick="resetToSearch()">&#8592; New Topic</button>
    </div>

    <script>
        let cards = [];
        let current = 0;

        async function generateCards() {
            const topic = document.getElementById("topicInput").value.trim();
            if (!topic) return;

            const btn = document.getElementById("generateBtn");
            const loading = document.getElementById("loading");
            btn.disabled = true;
            loading.style.display = "block";

            try {
                const res = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ topic })
                });
                const data = await res.json();

                if (data.error) {
                    alert("Error: " + data.error);
                    return;
                }

                cards = data.cards;
                current = 0;

                document.getElementById("topicLabel").textContent = topic.toUpperCase();
                document.getElementById("searchSection").style.display = "none";
                document.getElementById("flashcardSection").style.display = "flex";
                updateCard();

            } catch (err) {
                alert("Something went wrong. Try again.");
            } finally {
                btn.disabled = false;
                loading.style.display = "none";
            }
        }

        function updateCard() {
            const card = document.getElementById("card");
            card.classList.remove("flipped");

            setTimeout(() => {
                const front = document.getElementById("front");
                const back = document.getElementById("back");

                front.innerHTML = cards[current].question + '<span class="hint">CLICK TO FLIP</span>';
                back.innerHTML = cards[current].answer + '<span class="hint">CLICK TO FLIP BACK</span>';
            }, 300);

            document.getElementById("counter").textContent = (current + 1) + " / " + cards.length;
            renderDots();
        }

        function renderDots() {
            const dotsEl = document.getElementById("dots");
            dotsEl.innerHTML = "";
            cards.forEach((_, i) => {
                const dot = document.createElement("div");
                dot.className = "dot" + (i === current ? " active" : "");
                dot.onclick = () => goToCard(i);
                dotsEl.appendChild(dot);
            });
        }

        function toggleFlip() {
            document.getElementById("card").classList.toggle("flipped");
        }

        function changeCard(dir) {
            current = (current + dir + cards.length) % cards.length;
            updateCard();
        }

        function goToCard(i) {
            current = i;
            updateCard();
        }

        function resetToSearch() {
            document.getElementById("flashcardSection").style.display = "none";
            document.getElementById("searchSection").style.display = "flex";
            document.getElementById("topicInput").value = "";
        }

        // Allow pressing Enter to generate
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("topicInput").addEventListener("keydown", e => {
                if (e.key === "Enter") generateCards();
            });
        });
    </script>

</body>
</html>
